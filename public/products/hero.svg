<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 480" fill="none">
  <defs>
    <linearGradient id="heroBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b3410"/>
      <stop offset="40%" stop-color="#b06a25"/>
      <stop offset="100%" stop-color="#3a1b08"/>
    </linearGradient>
    <linearGradient id="heroHighlight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="35%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="heroCap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f1d77a"/>
      <stop offset="60%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#7a5d1c"/>
    </linearGradient>
    <filter id="heroShadow" x="-20%" y="-10%" width="140%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#heroShadow)">
    <rect x="146" y="20" width="68" height="56" rx="6" fill="url(#heroCap)"/>
    <rect x="158" y="76" width="44" height="22" fill="#7a5d1c"/>
    <path d="M100 120 Q100 100 180 100 Q260 100 260 120 L280 200 Q300 270 300 350 Q300 450 180 450 Q60 450 60 350 Q60 270 80 200 Z" fill="url(#heroBody)"/>
    <path d="M100 120 Q100 100 180 100 Q260 100 260 120 L280 200 Q300 270 300 350 Q300 450 180 450 Q60 450 60 350 Q60 270 80 200 Z" fill="url(#heroHighlight)"/>
    <rect x="120" y="290" width="120" height="80" rx="4" fill="#f5e6c8" fill-opacity="0.88"/>
    <text x="180" y="324" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#6b3410" font-style="italic">Orith</text>
    <text x="180" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6b3410" letter-spacing="3">LUXURY</text>
    <text x="180" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#6b3410" letter-spacing="2">EAU DE PARFUM</text>
  </g>
</svg>
